<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulation &amp; Angebote – GU Sanierungsbetrieb</title>
  <style>
    /* ── Reset & Base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      background: linear-gradient(160deg, #e8edf5 0%, #f0f2f5 60%, #e8eff8 100%);
      min-height: 100vh;
      color: #222;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #12294a 0%, #1a3a5c 40%, #2e6da4 100%);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      box-shadow: 0 3px 12px rgba(0,0,0,.4);
      print-color-adjust: exact;
      min-height: 62px;
    }
    header h1 { font-size: 1.25rem; letter-spacing: .5px; }
    header .logo { font-size: 1.9rem; margin-right: 12px; }
    header .header-left { display: flex; align-items: center; }
    header .header-subtitle { font-size: 10.5px; opacity: .75; margin-top: 2px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 12.5px; font-weight: 600;
      transition: opacity .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.22); }
    .btn:active { transform: translateY(0); }
    .btn-primary  { background: #fff; color: #1a3a5c; }
    .btn-success  { background: #27ae60; color: #fff; }
    .btn-warning  { background: #f39c12; color: #fff; }
    .btn-danger   { background: #e74c3c; color: #fff; }
    .btn-info     { background: #8e44ad; color: #fff; }
    .btn-teal     { background: #16a085; color: #fff; }
    .btn-orange   { background: #d35400; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .header-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    /* ── Header rows ─────────────────────────────────────────────── */
    .header-main { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; flex: 1; }
    .header-tools {
      display: flex; gap: 6px; align-items: center;
      padding: 8px 0 10px;
      border-top: 1px solid rgba(255,255,255,.15);
    }

    /* ── Layout ─────────────────────────────────────────────────── */
    .container { max-width: 1400px; margin: 0 auto; padding: 18px 16px; }

    /* ── Projekt-Kopf ───────────────────────────────────────────── */
    .projekt-card {
      background: #fff;
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .projekt-card h2 {
      grid-column: 1/-1;
      font-size: 1rem;
      color: #1a3a5c;
      border-bottom: 2px solid #2e6da4;
      padding-bottom: 6px;
      margin-bottom: 4px;
    }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: #666; text-transform: uppercase; margin-bottom: 3px;
    }
    .field input, .field textarea, .field select {
      width: 100%; padding: 6px 10px;
      border: 1px solid #d0d7e2; border-radius: 6px;
      font-size: 13px; background: #fafbfc;
      transition: border-color .15s;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none; border-color: #2e6da4; background: #fff;
    }

    /* ── Gewerke-Tabs ───────────────────────────────────────────── */
    .tabs-wrapper {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .tab-nav {
      display: flex; flex-wrap: wrap;
      background: #f7f9fc;
      border-bottom: 2px solid #e0e6f0;
    }
    .tab-nav button {
      padding: 10px 14px;
      border: none; background: none;
      cursor: pointer; font-size: 12.5px; font-weight: 600;
      color: #555; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .tab-nav button:hover { color: #2e6da4; }
    .tab-nav button.active { color: #1a3a5c; border-bottom-color: #2e6da4; background: #fff; }
    .tab-nav button .badge {
      display: inline-block; background: #2e6da4; color: #fff;
      border-radius: 10px; padding: 1px 7px; font-size: 10px;
      margin-left: 5px;
    }
    .tab-nav button.active .badge { background: #e74c3c; }

    .tab-content { display: none; padding: 18px; }
    .tab-content.active { display: block; }

    /* ── Zusammenfassung-Tab ────────────────────────────────────── */
    #tab-zusammenfassung .summen-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .sum-card {
      border-radius: 8px; padding: 14px 16px;
      background: #f7f9fc; border: 1px solid #e0e6f0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .sum-card .sum-label {
      font-size: 12px; font-weight: 700; color: #1a3a5c;
      text-transform: uppercase; letter-spacing: .4px;
    }
    .sum-card .sum-value {
      font-size: 1.4rem; font-weight: 800; color: #2e6da4;
    }
    .sum-card .sum-detail { font-size: 11px; color: #888; }
    .gesamt-box {
      background: linear-gradient(135deg, #1a3a5c, #2e6da4);
      color: #fff; border-radius: 10px; padding: 20px 24px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
    }
    .gesamt-box .g-label { font-size: 1.1rem; font-weight: 700; }
    .gesamt-box .g-value { font-size: 2rem; font-weight: 900; }
    .mwst-box {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 8px; padding: 12px 16px;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 12px; margin-bottom: 20px;
    }
    .mwst-item { text-align: center; }
    .mwst-item .ml { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; }
    .mwst-item .mv { font-size: 1.1rem; font-weight: 800; color: #333; }

    /* ── Positions-Tabelle ──────────────────────────────────────── */
    .gewerk-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .gewerk-header h3 {
      font-size: 1rem; color: #1a3a5c;
      display: flex; align-items: center; gap: 8px;
    }
    .gewerk-header h3 .icon { font-size: 1.3rem; }
    .gewerk-actions { display: flex; gap: 8px; }

    .table-wrap { overflow-x: auto; }
    table.kalk-table {
      width: 100%; border-collapse: collapse;
      min-width: 900px;
    }
    .kalk-table thead tr {
      background: #1a3a5c; color: #fff;
    }
    .kalk-table th {
      padding: 9px 8px; font-size: 11.5px;
      text-align: left; white-space: nowrap;
      font-weight: 700; text-transform: uppercase; letter-spacing: .4px;
    }
    .kalk-table th.right, .kalk-table td.right { text-align: right; }
    .kalk-table th.center, .kalk-table td.center { text-align: center; }
    .kalk-table tbody tr:nth-child(even) { background: #f7f9fc; }
    .kalk-table tbody tr:hover { background: #e8f0fb; }
    .kalk-table tbody tr.subtotal-row {
      background: #eaf1fb !important; font-weight: 700;
    }
    .kalk-table td {
      padding: 5px 6px; border-bottom: 1px solid #e8ecf2;
      vertical-align: middle;
    }
    .kalk-table td input, .kalk-table td select {
      width: 100%; padding: 4px 6px;
      border: 1px solid transparent; border-radius: 4px;
      background: transparent; font-size: 13px;
      transition: border-color .15s, background .15s;
    }
    .kalk-table td input:focus, .kalk-table td select:focus {
      outline: none; border-color: #2e6da4; background: #fff;
    }
    .kalk-table td input.num { text-align: right; }
    .kalk-table td .gesamtpreis {
      font-weight: 700; color: #1a3a5c; white-space: nowrap;
    }
    .kalk-table td .del-btn {
      background: none; border: none; cursor: pointer;
      color: #e74c3c; font-size: 16px; padding: 0 4px;
      line-height: 1;
    }
    .kalk-table td .del-btn:hover { color: #c0392b; }

    .kalk-table tfoot td {
      padding: 9px 8px; background: #dde6f3;
      font-weight: 700; color: #1a3a5c; font-size: 13px;
    }

    /* ── Notizen ────────────────────────────────────────────────── */
    .notiz-area {
      margin-top: 16px;
    }
    .notiz-area label { font-size: 12px; font-weight: 700; color: #555; display: block; margin-bottom: 4px; }
    .notiz-area textarea {
      width: 100%; min-height: 64px; padding: 8px 10px;
      border: 1px solid #d0d7e2; border-radius: 6px;
      font-size: 13px; resize: vertical;
    }
    .notiz-area textarea:focus { outline: none; border-color: #2e6da4; }

    /* ── Toast ──────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #27ae60; color: #fff; padding: 10px 22px;
      border-radius: 20px; font-weight: 600; font-size: 13px;
      box-shadow: 0 4px 12px rgba(0,0,0,.25); opacity: 0;
      transition: opacity .3s; pointer-events: none; z-index: 9999;
    }
    #toast.show { opacity: 1; }

    /* ── Drucken ────────────────────────────────────────────────── */
    @media print {
      body { background: #fff; font-size: 11px; }
      header { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .no-print { display: none !important; }
      .tab-content { display: block !important; padding: 8px 0; }
      .tabs-wrapper { box-shadow: none; }
      .tab-nav { display: none; }
      .kalk-table { page-break-inside: auto; }
      .kalk-table tr { page-break-inside: avoid; }
      .gesamt-box { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 1rem; }
      .header-actions { flex-wrap: wrap; }
    }

    /* ── Muster-Modal ───────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.52);
      z-index: 1000; display: flex;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-box {
      background: #fff; border-radius: 12px;
      max-width: 700px; width: 100%;
      max-height: 88vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    .modal-header {
      padding: 14px 20px; border-bottom: 2px solid #e0e6f0;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(135deg, #1a3a5c 0%, #2e6da4 100%);
      color: #fff; border-radius: 12px 12px 0 0; flex-shrink: 0;
    }
    .modal-header h3 { font-size: .95rem; }
    .modal-close {
      background: none; border: none; color: #fff;
      font-size: 1.3rem; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .modal-close:hover { opacity: .75; }
    .modal-body { overflow-y: auto; padding: 14px 18px; flex: 1; }
    .modal-group { margin-bottom: 14px; }
    .modal-group-title {
      font-size: 11.5px; font-weight: 700; color: #1a3a5c;
      text-transform: uppercase; letter-spacing: .45px;
      padding: 6px 10px; background: #eef2fa;
      border-left: 3px solid #2e6da4; border-radius: 0 4px 4px 0;
      margin-bottom: 6px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      user-select: none;
    }
    .modal-group-title:hover { background: #dce6f5; }
    .modal-pos-item {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 5px 8px; border-radius: 4px; cursor: pointer;
    }
    .modal-pos-item:hover { background: #f4f7fc; }
    .modal-pos-item input[type=checkbox] { margin-top: 2px; flex-shrink: 0; cursor: pointer; }
    .modal-pos-label { font-size: 12.5px; flex: 1; line-height: 1.4; }
    .modal-pos-label .pos-nr { color: #999; font-size: 11px; margin-right: 4px; font-weight: 600; }
    .modal-pos-label .pos-price { float: right; color: #2e6da4; font-weight: 700; font-size: 11.5px; margin-left: 8px; white-space: nowrap; }
    .modal-footer {
      padding: 11px 18px; border-top: 2px solid #e0e6f0;
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px; flex-shrink: 0; flex-wrap: wrap;
    }
    .modal-sel-btn {
      font-size: 12px; color: #1a3a5c; cursor: pointer;
      background: none; border: 1px solid #b0bfd8;
      padding: 4px 10px; border-radius: 4px;
    }
    .modal-sel-btn:hover { background: #eef2fa; }
    @media print { .modal-overlay { display: none !important; } }

    /* ── Wizard / Tool Modals ───────────────────────────────────── */
    .modal-box-lg {
      background: #fff; border-radius: 12px;
      max-width: 900px; width: 100%;
      max-height: 92vh; display: flex; flex-direction: column;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
    }
    .wiz-tabs { display: flex; gap: 0; border-bottom: 2px solid #e0e6f0; background: #f5f7fb; flex-shrink: 0; }
    .wiz-tab-btn {
      padding: 10px 18px; border: none; background: none; cursor: pointer;
      font-size: 12.5px; font-weight: 600; color: #666;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .wiz-tab-btn.active { color: #1a3a5c; border-bottom-color: #2e6da4; background: #fff; }
    .wiz-tab-btn:hover { color: #2e6da4; }

    .wiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
    .wiz-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
    .wiz-field { display: flex; flex-direction: column; gap: 4px; }
    .wiz-field label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }
    .wiz-field input, .wiz-field select {
      padding: 7px 10px; border: 1.5px solid #d0d7e2; border-radius: 7px;
      font-size: 13px; background: #fafbfc;
      transition: border-color .15s;
    }
    .wiz-field input:focus, .wiz-field select:focus {
      outline: none; border-color: #2e6da4; background: #fff;
    }
    .wiz-section { margin-bottom: 20px; }
    .wiz-section-title {
      font-size: 12px; font-weight: 800; color: #1a3a5c;
      text-transform: uppercase; letter-spacing: .5px;
      padding: 6px 12px; background: #eef2fa;
      border-left: 4px solid #2e6da4; border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
    }
    .wiz-info {
      background: #e8f4fd; border: 1px solid #bee3f8; color: #1a3a5c;
      padding: 10px 14px; border-radius: 8px; font-size: 12.5px;
      margin-bottom: 14px; line-height: 1.6;
    }
    .wiz-result-box {
      background: linear-gradient(135deg, #1a3a5c, #2e6da4);
      color: #fff; border-radius: 10px; padding: 18px 22px;
      margin-top: 16px;
    }
    .wiz-result-box h4 { font-size: 14px; margin-bottom: 12px; opacity: .9; }
    .wiz-result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .wiz-result-item { background: rgba(255,255,255,.15); border-radius: 8px; padding: 10px 12px; }
    .wiz-result-item .wri-label { font-size: 10px; opacity: .8; text-transform: uppercase; font-weight: 700; }
    .wiz-result-item .wri-value { font-size: 1.35rem; font-weight: 900; margin-top: 3px; }
    .wiz-result-item .wri-unit { font-size: 11px; opacity: .75; }
    .wiz-warn { background: #fff3cd; border: 1px solid #ffc107; padding: 8px 12px; border-radius: 6px; font-size: 12.5px; color: #7d5a00; margin-bottom: 10px; }
    .wiz-success { background: #d4edda; border: 1px solid #28a745; padding: 8px 12px; border-radius: 6px; font-size: 12.5px; color: #155724; margin-bottom: 10px; }
    .hlb-input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .hlb-result {
      margin-top: 16px; padding: 18px; border-radius: 10px;
      background: #f0faf5; border: 2px solid #27ae60;
    }
    .hlb-result h4 { color: #1a5c35; margin-bottom: 12px; font-size: 15px; }
    .hlb-kw { font-size: 2.2rem; font-weight: 900; color: #1a5c35; }
    .hlb-detail { font-size: 12px; color: #555; margin-top: 6px; line-height: 1.7; }
    .hlb-recommend { margin-top: 10px; padding: 8px 12px; background: #fff; border-radius: 6px; border: 1px solid #bde; font-size: 12.5px; }
    .checks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 14px; }
    .check-item { display: flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
    .check-item input { cursor: pointer; width: 16px; height: 16px; }
    /* konfigurator number-stepper */
    .stepper { display: flex; align-items: center; gap: 4px; }
    .stepper button { width: 26px; height: 26px; border: 1.5px solid #b0bfd8; background: #f7f9fc; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: 700; color: #1a3a5c; display: flex; align-items: center; justify-content: center; }
    .stepper button:hover { background: #dce6f5; }
    .stepper input { width: 52px; text-align: center; border: 1.5px solid #d0d7e2; border-radius: 5px; padding: 4px; font-size: 13px; }

    /* ── Tools-Banner ───────────────────────────────────────────── */
    .tools-banner {
      background: linear-gradient(135deg, #12294a 0%, #1a3a5c 50%, #1d5080 100%);
      border-bottom: 2px solid rgba(255,255,255,.1);
      padding: 8px 24px;
      display: flex; gap: 7px; align-items: center; flex-wrap: wrap;
    }
    .tools-banner .tl-label { color: rgba(255,255,255,.55); font-size: 11px; font-weight: 700; text-transform: uppercase; margin-right: 4px; }
    @media print { .tools-banner { display: none !important; } }

    /* ── Sum-card improvements ──────────────────────────────────── */
    .sum-card { transition: box-shadow .2s; }
    .sum-card:hover { box-shadow: 0 2px 10px rgba(46,109,164,.18); }

    /* ── Verteiler-Planeditor ────────────────────────────────────── */
    .vert-modal-box {
      background: #fff; border-radius: 12px;
      width: 96vw; max-width: 1160px;
      height: 88vh; max-height: 820px;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 48px rgba(0,0,0,.45);
      overflow: hidden;
    }
    .vert-body {
      display: flex; flex: 1; overflow: hidden; min-height: 0;
    }
    .vert-lib {
      width: 210px; min-width: 210px;
      border-right: 2px solid #e0e6f0;
      overflow-y: auto; background: #fafbfc;
      flex-shrink: 0;
    }
    .vert-lib-section {
      font-size: 9.5px; font-weight: 800; color: #999;
      text-transform: uppercase; letter-spacing: .6px;
      padding: 8px 10px 3px;
    }
    .vert-lib-item {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 8px; cursor: pointer;
      transition: background .1s; border-radius: 5px;
      margin: 1px 5px; border-left: 3px solid transparent;
    }
    .vert-lib-item:hover { background: #eef2fa; }
    .vert-lib-item.active {
      background: #dce6f5; border-left-color: #2e6da4;
    }
    .vert-lib-icon {
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px; font-size: 7.5px; font-weight: 900;
      flex-shrink: 0; letter-spacing: -.3px; white-space: nowrap;
    }
    .vert-lib-label { flex: 1; font-size: 11px; line-height: 1.3; }
    .vert-lib-te { font-size: 10px; color: #aaa; font-weight: 700; flex-shrink: 0; }
    .vert-canvas-wrap {
      flex: 1; overflow: auto; background: #e8edf5;
      display: flex; flex-direction: column;
      padding: 16px; gap: 6px; min-width: 0;
    }
    .vert-hint {
      text-align: center; color: #8a9ab0; font-size: 11px;
      padding: 4px; flex-shrink: 0;
    }
    .vert-props {
      width: 200px; min-width: 200px;
      border-left: 2px solid #e0e6f0;
      overflow-y: auto; background: #fafbfc;
      flex-shrink: 0;
    }
    .vert-props-inner { padding: 8px; }
    .vert-footer {
      padding: 9px 16px; border-top: 2px solid #e0e6f0;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0; background: #f7f9fc; gap: 8px; flex-wrap: wrap;
    }
    @media print { .vert-modal-box { display: none !important; } }

    /* ── Grundriss-Editor ────────────────────────────────────────── */
    .gr-modal-box {
      background: #fff; border-radius: 12px;
      width: 98vw; max-width: 1320px;
      height: 92vh;
      display: flex; flex-direction: column;
      box-shadow: 0 10px 52px rgba(0,0,0,.48);
      overflow: hidden;
    }
    .gr-body { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    .gr-lib {

    .gr-scale-info { font-size: 10.5px; color: #8a97a8; margin-left: 6px; }
    @media print { .gr-modal-box { display: none !important; } }
  </style>
</head>
<body>

<script>
/* ═══════════════════════════════════════════════════════════════
   Konfiguration der Gewerke
═══════════════════════════════════════════════════════════════ */
const GEWERKE = [
  { id: 'zusammenfassung', label: '📊 Zusammenfassung', icon: '📊', spezial: true },
  { id: 'elektro',         label: '⚡ Elektro',         icon: '⚡' },
  { id: 'sanitaer',        label: '🚿 Sanitär',         icon: '🚿' },
  { id: 'heizung',         label: '🔥 Heizung',         icon: '🔥' },
  { id: 'trockenbau',      label: '🧱 Trockenbau',      icon: '🧱' },
  { id: 'maler',           label: '🎨 Maler',           icon: '🎨' },
  { id: 'boden',           label: '🪵 Boden',           icon: '🪵' },
  { id: 'fliesen',         label: '🔷 Fliesen',         icon: '🔷' },
  { id: 'tueren',          label: '🚪 Türen',           icon: '🚪' },
  { id: 'fenster',         label: '🪟 Fenster',         icon: '🪟' },
  { id: 'abbruch',         label: '⛏️ Abbruch',         icon: '⛏️' },
  { id: 'rohbau',          label: '🏗️ Rohbau',          icon: '🏗️' },
  { id: 'bodenplatte',     label: '⬛ Bodenplatte',     icon: '⬛' },
];

const EINHEITEN = ['m','m²','m³','lfm','Stk','Pauschal','h','kg','t','L','Set','VE'];

/* ═══════════════════════════════════════════════════════════════
   Daten-Model
═══════════════════════════════════════════════════════════════ */
let daten = { positionen: {}, notizen: {} };

GEWERKE.filter(g => !g.spezial).forEach(g => {
  daten.positionen[g.id] = [];
  daten.notizen[g.id] = '';
});

/* ═══════════════════════════════════════════════════════════════
   Tab-Rendering
═══════════════════════════════════════════════════════════════ */
function renderTabs() {
  const nav = document.getElementById('tabNav');
  const contents = document.getElementById('tabContents');
  nav.innerHTML = '';
  contents.innerHTML = '';

  GEWERKE.forEach((g, idx) => {
    // Tab-Button
    const btn = document.createElement('button');
    btn.id = 'btn-' + g.id;
    btn.innerHTML = g.label + (g.spezial ? '' : `<span class="badge" id="badge-${g.id}">0</span>`);
    btn.onclick = () => switchTab(g.id);
    if (idx === 0) btn.classList.add('active');
    nav.appendChild(btn);

    // Tab-Inhalt
    const div = document.createElement('div');
    div.id = 'tab-' + g.id;
    div.className = 'tab-content' + (idx === 0 ? ' active' : '');
    if (g.spezial) {
      div.innerHTML = renderZusammenfassung();
    } else {
      div.innerHTML = renderGewerk(g);
    }
    contents.appendChild(div);
  });
}

function switchTab(id) {
  document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('btn-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'zusammenfassung') refreshZusammenfassung();
}

/* ═══════════════════════════════════════════════════════════════
   Gewerk-Tab HTML
═══════════════════════════════════════════════════════════════ */
function renderGewerk(g) {
  return `
    <div class="gewerk-header">
      <h3><span class="icon">${g.icon}</span> ${g.label.replace(/^[^\s]+\s/, '')}</h3>
      <div class="gewerk-actions no-print">
        <button class="btn btn-success btn-sm" onclick="addPosition('${g.id}')">➕ Position hinzufügen</button>
        <button class="btn btn-warning btn-sm" onclick="addMusterpositionen('${g.id}')">📋 Musterpositionen</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="kalk-table" id="tbl-${g.id}">
        <thead>
          <tr>
            <th style="width:40px">Pos.</th>
            <th>Beschreibung / Leistung</th>
            <th style="width:80px">Einheit</th>
            <th class="right" style="width:80px">Menge</th>
            <th class="right" style="width:110px">Material (€/Einheit)</th>
            <th class="right" style="width:100px">Stundensatz (€/h)</th>
            <th class="right" style="width:80px">Stunden</th>
            <th class="right" style="width:120px">Gesamtpreis (€)</th>
            <th class="center no-print" style="width:36px"></th>
          </tr>
        </thead>
        <tbody id="tbody-${g.id}"></tbody>
        <tfoot>
          <tr>
            <td colspan="7" class="right">Summe ${g.label.replace(/^[^\s]+\s/, '')}:</td>
            <td class="right" id="sum-${g.id}">0,00 €</td>
            <td class="no-print"></td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div class="notiz-area">
      <label>📝 Notizen / Hinweise für dieses Gewerk:</label>
      <textarea id="notiz-${g.id}" placeholder="Besondere Hinweise, Bedingungen, Materialangaben …"
        oninput="daten.notizen['${g.id}']=this.value; autoSave()">${daten.notizen[g.id] || ''}</textarea>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   Positionen
═══════════════════════════════════════════════════════════════ */
let posIdCounter = 1000;

function newPos(gewerkId) {
  const stdSatz = parseFloat(document.getElementById('defaultStundensatz').value) || 0;
  return {
    id: ++posIdCounter,
    pos: '',
    beschreibung: '',
    einheit: 'm²',
    menge: 0,
    materialpreis: 0,
    stundensatz: stdSatz,
    stunden: 0
  };
}

function addPosition(gewerkId) {
  daten.positionen[gewerkId].push(newPos(gewerkId));
  renderPositionen(gewerkId);
  autoSave();
}

function deletePosition(gewerkId, posId) {
  daten.positionen[gewerkId] = daten.positionen[gewerkId].filter(p => p.id !== posId);
  renderPositionen(gewerkId);
  autoSave();
}

function updatePos(gewerkId, posId, field, value) {
  const pos = daten.positionen[gewerkId].find(p => p.id === posId);
  if (!pos) return;
  if (['menge','materialpreis','stundensatz','stunden'].includes(field)) {
    pos[field] = parseFloat(value) || 0;
  } else {
    pos[field] = value;
  }
  // Nur Gesamtpreis-Zelle neu rechnen
  const cell = document.getElementById('gp-' + posId);
  if (cell) cell.textContent = formatEur(calcGesamtpreis(pos));
  updateSumme(gewerkId);
  autoSave();
}

function calcGesamtpreis(pos) {
  return (pos.menge * pos.materialpreis) + (pos.stundensatz * pos.stunden);
}

function updateSumme(gewerkId) {
  const sum = daten.positionen[gewerkId].reduce((s, p) => s + calcGesamtpreis(p), 0);
  const el = document.getElementById('sum-' + gewerkId);
  if (el) el.textContent = formatEur(sum);
  const badge = document.getElementById('badge-' + gewerkId);
  if (badge) badge.textContent = daten.positionen[gewerkId].length;
}

function renderPositionen(gewerkId) {
  const tbody = document.getElementById('tbody-' + gewerkId);
  if (!tbody) return;
  tbody.innerHTML = '';

  daten.positionen[gewerkId].forEach((pos, idx) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${esc(pos.pos)}" placeholder="${idx+1}"
        oninput="updatePos('${gewerkId}',${pos.id},'pos',this.value)" style="width:36px;text-align:center"></td>
      <td><input type="text" value="${esc(pos.beschreibung)}" placeholder="Leistungsbeschreibung …"
        oninput="updatePos('${gewerkId}',${pos.id},'beschreibung',this.value)" style="min-width:200px"></td>
      <td>
        <select onchange="updatePos('${gewerkId}',${pos.id},'einheit',this.value)">
          ${EINHEITEN.map(e => `<option value="${e}" ${pos.einheit===e?'selected':''}>${e}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" class="num" value="${pos.menge||''}" placeholder="0" min="0" step="any"
        oninput="updatePos('${gewerkId}',${pos.id},'menge',this.value)"></td>
      <td><input type="number" class="num" value="${pos.materialpreis||''}" placeholder="0,00" min="0" step="0.01"
        oninput="updatePos('${gewerkId}',${pos.id},'materialpreis',this.value)"></td>
      <td><input type="number" class="num" value="${pos.stundensatz||''}" placeholder="0,00" min="0" step="0.01"
        oninput="updatePos('${gewerkId}',${pos.id},'stundensatz',this.value)"></td>
      <td><input type="number" class="num" value="${pos.stunden||''}" placeholder="0" min="0" step="0.1"
        oninput="updatePos('${gewerkId}',${pos.id},'stunden',this.value)"></td>
      <td class="right"><span class="gesamtpreis" id="gp-${pos.id}">${formatEur(calcGesamtpreis(pos))}</span></td>
      <td class="center no-print">
        <button class="del-btn" onclick="deletePosition('${gewerkId}',${pos.id})" title="Löschen">✕</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  updateSumme(gewerkId);
}

/* ═══════════════════════════════════════════════════════════════
   Muster-Modal – Positionsauswahl
═══════════════════════════════════════════════════════════════ */
function addMusterpositionen(gewerkId) {
  const muster = MUSTER[gewerkId];
  if (!muster || muster.length === 0) { showToast('Keine Musterpositionen verfügbar'); return; }
  openMusterModal(gewerkId, muster);
}

function openMusterModal(gewerkId, muster) {
  const existing = document.getElementById('musterModal');
  if (existing) existing.remove();

  // Group positions by gruppe field
  const gruppen = {};
  muster.forEach((m, globalIdx) => {
    const g = m.gruppe || 'Allgemein';
    if (!gruppen[g]) gruppen[g] = [];
    gruppen[g].push({ ...m, _idx: globalIdx });
  });

  const gewerk = GEWERKE.find(g => g.id === gewerkId);
  const title = gewerk ? gewerk.label.replace(/^[^\s]+\s/, '') : gewerkId;

  let bodyHTML = '';
  Object.entries(gruppen).forEach(([gruppenName, positionen]) => {
    bodyHTML += `
      <div class="modal-group">
        <div class="modal-group-title" onclick="toggleMusterGruppe(this)">
          <span>${gruppenName}</span>
          <span style="font-size:10px;opacity:.7">${positionen.length} Pos. ▾</span>
        </div>
        <div class="modal-group-items">`;
    positionen.forEach(m => {
      const cbId = `mpos_${gewerkId}_${String(m._idx)}`;
      const preis = m.materialpreis.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      bodyHTML += `
          <label class="modal-pos-item">
            <input type="checkbox" id="${cbId}" data-idx="${m._idx}">
            <div class="modal-pos-label">
              <span class="pos-nr">${m.pos}</span>${esc(m.beschreibung)} – ${m.menge} ${m.einheit}
              <span class="pos-price">${preis} €/${m.einheit}</span>
            </div>
          </label>`;
    });
    bodyHTML += `\n        </div>\n      </div>`;
  });

  const modal = document.createElement('div');
  modal.id = 'musterModal';
  modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-box">
      <div class="modal-header">
        <h3>📋 Musterpositionen – ${title}</h3>
        <button class="modal-close" onclick="closeMusterModal()" title="Schließen">✕</button>
      </div>
      <div class="modal-body">${bodyHTML}</div>
      <div class="modal-footer">
        <div style="display:flex;gap:6px">
          <button class="modal-sel-btn" onclick="musterSelectAll(true)">✅ Alle</button>
          <button class="modal-sel-btn" onclick="musterSelectAll(false)">☐ Keine</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="musterCountLabel" style="font-size:12px;color:#666"></span>
          <button class="btn btn-danger btn-sm no-print" onclick="closeMusterModal()">Abbrechen</button>
          <button class="btn btn-success btn-sm no-print" onclick="insertMusterSelected('${gewerkId}')">➕ Einfügen</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) closeMusterModal(); });

  updateMusterCount();
  modal.querySelectorAll('input[type=checkbox]').forEach(cb =>
    cb.addEventListener('change', updateMusterCount)
  );
}

function updateMusterCount() {
  const modal = document.getElementById('musterModal');
  if (!modal) return;
  const count = modal.querySelectorAll('input[type=checkbox]:checked').length;
  const el = document.getElementById('musterCountLabel');
  if (el) el.textContent = `${count} ausgewählt`;
}

function musterSelectAll(checked) {
  const modal = document.getElementById('musterModal');
  if (!modal) return;
  modal.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = checked);
  updateMusterCount();
}

function toggleMusterGruppe(titleEl) {
  const items = titleEl.nextElementSibling;
  if (!items) return;
  const collapsed = items.style.display === 'none';
  items.style.display = collapsed ? '' : 'none';
  titleEl.querySelector('span:last-child').textContent =
    titleEl.querySelector('span:last-child').textContent.replace(collapsed ? '▸' : '▾', collapsed ? '▾' : '▸');
}

function closeMusterModal() {
  const modal = document.getElementById('musterModal');
  if (modal) modal.remove();
}

function insertMusterSelected(gewerkId) {
  const modal = document.getElementById('musterModal');
  if (!modal) return;
  const muster = MUSTER[gewerkId];
  const stdSatz = parseFloat(document.getElementById('defaultStundensatz').value) || 0;
  let count = 0;
  modal.querySelectorAll('input[type=checkbox]:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.idx, 10);
    const m = muster[idx];
    if (!m) return;
    daten.positionen[gewerkId].push({
      id: ++posIdCounter,
      pos: m.pos,
      beschreibung: m.beschreibung,
      einheit: m.einheit,
      menge: m.menge,
      materialpreis: m.materialpreis,
      stundensatz: stdSatz || m.stundensatz,
      stunden: m.stunden
    });
    count++;
  });
  closeMusterModal();
  renderPositionen(gewerkId);
  autoSave();
  showToast(`${count} Position${count !== 1 ? 'en' : ''} eingefügt ✅`);
}

function refreshZusammenfassung() {
  const grid = document.getElementById('summenGrid');
  if (!grid) return;
  grid.innerHTML = '';
  let gesamtNetto = 0;

  GEWERKE.filter(g => !g.spezial).forEach(g => {
    const sum = (daten.positionen[g.id] || []).reduce((s, p) => s + calcGesamtpreis(p), 0);
    gesamtNetto += sum;
    const card = document.createElement('div');
    card.className = 'sum-card';
    const anzahl = (daten.positionen[g.id] || []).length;
    card.innerHTML = `
      <div class="sum-label">${g.label}</div>
      <div class="sum-value">${formatEur(sum)}</div>
      <div class="sum-detail">${anzahl} Position${anzahl !== 1 ? 'en' : ''}</div>
    `;
    grid.appendChild(card);
  });

  const mwst = parseFloat(document.getElementById('mwstSatz').value) || 19;
  const mwstBetrag = gesamtNetto * mwst / 100;
  const brutto = gesamtNetto + mwstBetrag;

  document.getElementById('z-gesamt').textContent = formatEur(gesamtNetto);
  document.getElementById('z-netto').textContent = formatEur(gesamtNetto);
  document.getElementById('z-mwst-label').textContent = mwst;
  document.getElementById('z-mwst-val').textContent = formatEur(mwstBetrag);
  document.getElementById('z-brutto').textContent = formatEur(brutto);
  const datumEl = document.getElementById('z-datum');
  if (datumEl) {
    const proj = document.getElementById('projektName').value;
    const dat = document.getElementById('datum').value;
    if (dat) {
      const [y, m, d] = dat.split('-').map(Number);
      datumEl.textContent = [proj, new Date(y, m - 1, d).toLocaleDateString('de-DE')].filter(Boolean).join(' | ');
    } else {
      datumEl.textContent = proj;
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   Speichern / Laden
═══════════════════════════════════════════════════════════════ */
let saveTimer;
function autoSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(speichern, 800);
}

function speichern() {
  const projektdaten = {
    angebotsNr: v('angebotsNr'),
    datum: v('datum'),
    projektName: v('projektName'),
    kunde: v('kunde'),
    adresse: v('adresse'),
    bearbeiter: v('bearbeiter'),
    defaultStundensatz: v('defaultStundensatz'),
    mwstSatz: v('mwstSatz'),
  };
  localStorage.setItem('kalkulation_projekt', JSON.stringify(projektdaten));
  localStorage.setItem('kalkulation_daten', JSON.stringify(daten));
  showToast('💾 Gespeichert');
}

function laden() {
  const pd = JSON.parse(localStorage.getItem('kalkulation_projekt') || 'null');
  if (pd) {
    Object.keys(pd).forEach(k => { const el = document.getElementById(k); if (el) el.value = pd[k] || ''; });
  }
  const dd = JSON.parse(localStorage.getItem('kalkulation_daten') || 'null');
  if (dd) {
    if (dd.positionen) {
      Object.keys(dd.positionen).forEach(k => {
        if (daten.positionen[k] !== undefined) {
          daten.positionen[k] = dd.positionen[k];
          // Restore IDs
          daten.positionen[k].forEach(p => { if (p.id > posIdCounter) posIdCounter = p.id; });
        }
      });
    }
    if (dd.notizen) daten.notizen = { ...daten.notizen, ...dd.notizen };
  }
  // Render all positions
  GEWERKE.filter(g => !g.spezial).forEach(g => {
    renderPositionen(g.id);
    const notizEl = document.getElementById('notiz-' + g.id);
    if (notizEl) notizEl.value = daten.notizen[g.id] || '';
  });
  const notizAllg = document.getElementById('notiz-allgemein');
  if (notizAllg) notizAllg.value = daten.notizen['allgemein'] || '';
  refreshZusammenfassung();
}

function allesZuruecksetzen() {
  if (!confirm('Alle Daten zurücksetzen? Dieser Vorgang kann nicht rückgängig gemacht werden!')) return;
  localStorage.removeItem('kalkulation_projekt');
  localStorage.removeItem('kalkulation_daten');
  location.reload();
}

/* ═══════════════════════════════════════════════════════════════
   Export / Import JSON
═══════════════════════════════════════════════════════════════ */
function exportJSON() {
  const payload = {
    projekt: {
      angebotsNr: v('angebotsNr'), datum: v('datum'), projektName: v('projektName'),
      kunde: v('kunde'), adresse: v('adresse'), bearbeiter: v('bearbeiter'),
      defaultStundensatz: v('defaultStundensatz'), mwstSatz: v('mwstSatz'),
    },
    daten,
    exportiert: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Kalkulation_${(v('angebotsNr') || 'Export').replace(/[\\/:*?"<>|]/g, '_')}_${new Date().toLocaleDateString('de-DE').replace(/\./g,'-')}.json`;
  a.click();
  showToast('📤 Exportiert');
}

function importClick() { document.getElementById('importFile').click(); }

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      if (payload.projekt) {
        Object.keys(payload.projekt).forEach(k => { const el = document.getElementById(k); if (el) el.value = payload.projekt[k] || ''; });
      }
      if (payload.daten) {
        if (payload.daten.positionen) {
          Object.keys(payload.daten.positionen).forEach(k => {
            if (daten.positionen[k] !== undefined) {
              daten.positionen[k] = payload.daten.positionen[k];
              daten.positionen[k].forEach(p => { if (p.id > posIdCounter) posIdCounter = p.id; });
            }
          });
        }
        if (payload.daten.notizen) daten.notizen = { ...daten.notizen, ...payload.daten.notizen };
      }
      GEWERKE.filter(g => !g.spezial).forEach(g => {
        renderPositionen(g.id);
        const notizEl = document.getElementById('notiz-' + g.id);
        if (notizEl) notizEl.value = daten.notizen[g.id] || '';
      });
      const notizAllg = document.getElementById('notiz-allgemein');
      if (notizAllg) notizAllg.value = daten.notizen['allgemein'] || '';
      refreshZusammenfassung();
      speichern();
      showToast('📥 Importiert ✅');
    } catch(err) {
      alert('Fehler beim Importieren: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

/* ═══════════════════════════════════════════════════════════════
   Hilfsfunktionen
═══════════════════════════════════════════════════════════════ */
function formatEur(val) {
  return val.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function v(id) { return (document.getElementById(id) || {}).value || ''; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function schnellKalkulationPreview() {
  const result = schnellKalkulationBerechne();
  const box = document.getElementById('sk_preview');
  if (!box) return;
  const gewSelected = [...document.querySelectorAll('.sk-gewerk:checked')].map(c => c.value);
  let html = '<div style="margin-top:10px">';
  let totalMat = 0, totalPos = 0;
  gewSelected.forEach(id => {
    const items = result[id] || [];
    if (!items.length) return;
    const g = GEWERKE.find(g => g.id === id);
    const matSum = items.reduce((s, p) => s + (p.menge * p.materialpreis), 0);
    totalMat += matSum;
    totalPos += items.length;
    html += `<div style="display:flex;justify-content:space-between;padding:5px 8px;margin-bottom:3px;background:#f7f9fc;border-radius:5px;font-size:12.5px">
      <span>${g.label}</span>
      <span><b>${items.length} Pos.</b> · Material ca. ${matSum.toLocaleString('de-DE',{maximumFractionDigits:0})} €</span>
    </div>`;
  });
  html += `<div style="display:flex;justify-content:space-between;padding:8px 10px;background:#1a3a5c;color:#fff;border-radius:6px;margin-top:8px;font-weight:700">
    <span>Gesamt Positionen: ${totalPos}</span>
    <span>Material ca. ${totalMat.toLocaleString('de-DE',{maximumFractionDigits:0})} €</span>
  </div></div>`;
  box.innerHTML = html;
}

function schnellKalkulationEinfuegen() {
  const result = schnellKalkulationBerechne();
  const gewSelected = [...document.querySelectorAll('.sk-gewerk:checked')].map(c => c.value);
  const stdSatz = parseFloat(document.getElementById('defaultStundensatz').value) || 65;
  let count = 0;
  const m = document.getElementById('schnellModal');
  if (m) m.remove();
  gewSelected.forEach(id => {
    const items = result[id] || [];
    items.forEach(p => {
      daten.positionen[id].push({ id: ++posIdCounter, ...p, stundensatz: stdSatz || p.stundensatz });
      count++;
    });
    renderPositionen(id);
  });
  autoSave();
  showToast(`✅ ${count} Positionen in ${gewSelected.length} Gewerke eingefügt`);
}

function hlBerechne() {
  const m2     = parseFloat(document.getElementById('hl_m2')?.value) || 120;
  const hoehe  = parseFloat(document.getElementById('hl_hoehe')?.value) || 2.6;
  const aussen = parseInt(document.getElementById('hl_aussenwaende')?.value) || 2;
  const ta     = parseFloat(document.getElementById('hl_region')?.value) || -14;
  const ti     = parseFloat(document.getElementById('hl_tin')?.value) || 20;
  const uw     = parseFloat(document.getElementById('hl_uw')?.value) || 0.18;
  const ur     = parseFloat(document.getElementById('hl_ur')?.value) || 0.15;
  const ub     = parseFloat(document.getElementById('hl_ub')?.value) || 0.22;
  const uf     = parseFloat(document.getElementById('hl_uf')?.value) || 1.10;
  const fant   = (parseFloat(document.getElementById('hl_fensterant')?.value) || 15) / 100;
  const n      = parseFloat(document.getElementById('hl_lueft')?.value) || 0.5;
  const gebtyp = document.getElementById('hl_gebtype')?.value || 'efw';

  const dt = ti - ta;
  // estimate geometry
  const grundflaeche = m2;
  const perimeter = Math.sqrt(m2) * 4;
  const wandhoehe = hoehe;
  // Außenwandfläche = Perimeter × Höhe × Anteil Außenwände (1=4 Seiten, 0.25 per Seite)
  const awAnteil = { efw: 1.0, rh: 0.5, mfh: 0.35 }[gebtyp] || 1.0;
  const Aw_brutto = perimeter * wandhoehe * awAnteil;
  const Af = Aw_brutto * fant;
  const Aw = Aw_brutto - Af;
  const Ar = grundflaeche;  // Dachfläche ≈ Grundfläche
  const Ab = grundflaeche;  // Bodenfläche

  // Transmission
  const Qt = (Aw*uw + Af*uf + Ar*ur + Ab*ub) * dt / 1000; // kW

  // Lüftung: QL = 0.34 × V × n × ΔT / 1000
  const V = m2 * hoehe; // Raumvolumen
  const Ql = 0.34 * V * n * dt / 1000; // kW

  const Qges = Qt + Ql;
  const Qsicher = Qges * 1.10; // 10% Sicherheitszuschlag

  const hlEl = document.getElementById('hl_result');
  if (!hlEl) return;

  // Empfehlung
  let empfehlung = '';
  let heizungstyp = '';
  if (Qsicher < 6)       { heizungstyp = 'Luft-Wasser-Wärmepumpe 5–8 kW'; }
  else if (Qsicher < 10) { heizungstyp = 'Luft-Wasser-Wärmepumpe 8–12 kW'; }
  else if (Qsicher < 15) { heizungstyp = 'Wärmepumpe 12–15 kW oder Gas-Brennwert 15 kW'; }
  else if (Qsicher < 22) { heizungstyp = 'Gas-Brennwert 20–24 kW'; }
  else                    { heizungstyp = 'Gas-Brennwert 24 kW+ oder Pelletkessel'; }

  // FBH Auslegung
  const fbhFlaeche = m2 * 0.85;
  const fbhLeistung = (Qges * 1000 / fbhFlaeche).toFixed(0); // W/m²

  empfehlung = `
    <div class="hlb-recommend">
      <b>🔥 Empfohlene Heizungsanlage:</b> ${heizungstyp}<br>
      <b>♨️ FBH-Auslegung:</b> ${fbhFlaeche.toFixed(0)} m² @ ca. ${fbhLeistung} W/m² Heizfläche<br>
      <b>💡 Normheizlast:</b> ${(Qsicher/m2*1000).toFixed(0)} W/m² spezifische Heizlast
    </div>`;

  hlEl.innerHTML = `<div class="hlb-result">
    <h4>📊 Heizlastergebnis</h4>
    <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px">
      <span class="hlb-kw">${Qsicher.toFixed(1)} kW</span>
      <span style="font-size:13px;color:#555">Normheizlast (inkl. 10% Zuschlag)</span>
    </div>
    <div class="hlb-detail">
      <b>Transmissionswärmeverluste Qt:</b> ${Qt.toFixed(2)} kW<br>
      <b>Lüftungswärmeverluste Ql:</b> ${Ql.toFixed(2)} kW<br>
      <b>Gesamtverluste (ohne Zuschlag):</b> ${Qges.toFixed(2)} kW<br>
      <b>Außenwandfläche (netto):</b> ${Aw.toFixed(0)} m² · U=${uw} · <b>Fensterfläche:</b> ${Af.toFixed(0)} m² · U=${uf}<br>
      <b>Temperaturdifferenz ΔT:</b> ${dt}K · <b>Raumvolumen:</b> ${(m2*hoehe).toFixed(0)} m³
    </div>
    ${empfehlung}
  </div>`;
  window._hlErgebnis = { kw: Qsicher, heizungstyp, m2 };
}

function hlPositionenEinfuegen() {
  if (!window._hlErgebnis) return;
  const { kw, heizungstyp, m2 } = window._hlErgebnis;
  const stdSatz = parseFloat(document.getElementById('defaultStundensatz').value) || 65;
  daten.positionen.heizung.push({

  showToast('✅ Heizlast-Position ins Angebot übernommen');
}

/* ── Adjust rows / TE ────────────────────────────────────────── */
function vertAdjust(key, delta) {
  if (key === 'rows') {
    if (delta !== 0) vertState.rows = Math.max(1, Math.min(8, vertState.rows + delta));
    else vertState.rows = Math.max(1, Math.min(8, parseInt(document.getElementById('vert-rows-inp').value) || 3));
    document.getElementById('vert-rows-inp').value = vertState.rows;
  } else {
    if (delta !== 0) vertState.te = Math.max(6, Math.min(72, vertState.te + delta));
    else vertState.te = Math.max(6, Math.min(72, parseInt(document.getElementById('vert-te-inp').value) || 24));
    document.getElementById('vert-te-inp').value = vertState.te;
  }
  // Remove out-of-bounds items
  vertState.items = vertState.items.filter(it => {
    const b = VERT_LIB.find(c => c.type === it.type);
    return it.row < vertState.rows && it.col + (b ? b.te : 1) <= vertState.te;
  });
  renderVert();
}

/* ── Tool selection ──────────────────────────────────────────── */
function vertSelectTool(type) {
  vertState.activeTool = type;
  vertState.selectedId = null;
  document.querySelectorAll('.vert-lib-item').forEach(el => el.classList.remove('active'));
  if (type) {
    const el = document.getElementById('vli-' + type);
    if (el) el.classList.add('active');
  }
  const hint = document.getElementById('vert-hint');
  if (hint) hint.textContent = type
    ? '✏️ Auf eine freie Schienenstelle klicken zum Platzieren — oder Werkzeug oben abwählen'
    : '💡 Bauteil in Bibliothek anklicken → auf freie Schienenstelle klicken zum Platzieren';
  updateVertProps();
  renderVert();
}

/* ── Canvas click → place component ─────────────────────────── */
function vertCanvasClick(e) {
  if (!vertState.activeTool) return;
  const wrap = document.getElementById('vert-svg-wrap');
  const svgEl = wrap ? wrap.querySelector('svg') : null;
  if (!svgEl) return;

  const rect = svgEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const col = Math.floor((x - VERT_PAD_X) / VERT_TE_W);
  const row = Math.floor((y - VERT_PAD_Y) / VERT_ROW_H);
  if (row < 0 || row >= vertState.rows || col < 0) return;

  const comp = VERT_LIB.find(b => b.type === vertState.activeTool);
  if (!comp || col + comp.te > vertState.te) return;

  // Check overlap
  const occ = vertGetOccupied(row);
  for (let c = col; c < col + comp.te; c++) {
    if (occ.has(c)) {
      const hint = document.getElementById('vert-hint');
      if (hint) {
        hint.textContent = '⚠️ Position belegt – bitte freie Stelle wählen';
        hint.style.color = '#c0392b';
        clearTimeout(hint._t);
        hint._t = setTimeout(() => {
          hint.style.color = '';
          hint.textContent = '✏️ Auf eine freie Schienenstelle klicken zum Platzieren — oder Werkzeug oben abwählen';
        }, 2000);
      }
      return;
    }
  }

  const item = {
    id: vertState.nextId++,
    type: vertState.activeTool,
    row, col,
    label: '',
    ampere: comp.ampere
  };
  vertState.items.push(item);
  vertState.selectedId = item.id;
  updateVertProps();
  renderVert();
}

/* ── Select placed component ─────────────────────────────────── */
function vertCompClick(e, id) {
  e.stopPropagation();
  if (vertState.activeTool) return;  // in placement mode → ignore
  vertState.selectedId = vertState.selectedId === id ? null : id;
  updateVertProps();
  renderVert();
}

/* ── Properties panel ────────────────────────────────────────── */
function updateVertProps() {
  const body = document.getElementById('vert-props-body');
  if (!body) return;
  const item = vertState.items.find(i => i.id === vertState.selectedId);
  if (!item) {
    body.innerHTML = '<span style="color:#aaa;font-size:12px">Kein Bauteil gewählt.</span>';
    return;
  }
  const comp = VERT_LIB.find(b => b.type === item.type);
  const ampereOptions = [6,10,13,16,20,25,32,40,50,63]
    .map(a => `<option value="${a}"${item.ampere===a?' selected':''}>${a} A</option>`).join('');
  body.innerHTML = `
    <div style="font-size:12px;font-weight:700;color:#1a3a5c;margin-bottom:8px;line-height:1.3">${comp ? comp.label : item.type}</div>
    <div class="wiz-field" style="margin-bottom:9px">
      <label>Beschriftung</label>
      <input type="text" value="${esc(item.label)}" placeholder="z.B. Licht OG"
        oninput="vertUpdateItem(${item.id},'label',this.value)"
        style="font-size:12px;padding:5px 8px;border:1.5px solid #d0d7e2;border-radius:6px;width:100%">
    </div>
    ${comp && comp.ampere > 0 ? `
    <div class="wiz-field" style="margin-bottom:9px">
      <label>Ampere</label>
      <select onchange="vertUpdateItem(${item.id},'ampere',+this.value)"
        style="font-size:12px;padding:5px 8px;border:1.5px solid #d0d7e2;border-radius:6px;width:100%">
        ${ampereOptions}
      </select>
    </div>` : ''}
    <div style="font-size:10.5px;color:#999;margin-bottom:10px;line-height:1.7">
      Reihe&nbsp;${item.row+1},&nbsp;Pos.&nbsp;${item.col+1}–${item.col+(comp?comp.te:1)}<br>
      Breite:&nbsp;${comp ? comp.te : 1}&nbsp;TE
    </div>
    <button class="btn btn-danger btn-sm" style="width:100%" onclick="vertDeleteSelected()">🗑️ Löschen</button>`;
}

function vertUpdateItem(id, field, value) {
  const item = vertState.items.find(i => i.id === id);
  if (item) { item[field] = value; renderVert(); }
}

function vertDeleteSelected() {
  if (!vertState.selectedId) return;
  vertState.items = vertState.items.filter(i => i.id !== vertState.selectedId);
  vertState.selectedId = null;
  updateVertProps();
  renderVert();
}

function vertClearAll() {
  if (!confirm('Alle Bauteile löschen?')) return;
  vertState.items = [];
  vertState.selectedId = null;
  updateVertProps();
  renderVert();
}

/* ── Occupied TE set for a row ───────────────────────────────── */
function vertGetOccupied(row) {
  const s = new Set();
  vertState.items.filter(i => i.row === row).forEach(i => {
    const b = VERT_LIB.find(c => c.type === i.type);
    const te = b ? b.te : 1;
    for (let c = i.col; c < i.col + te; c++) s.add(c);
  });
  return s;
}

/* ── SVG Renderer ────────────────────────────────────────────── */
function renderVert() {
  const wrap = document.getElementById('vert-svg-wrap');
  if (!wrap) return;

  const svgW = vertState.te * VERT_TE_W + VERT_PAD_X + 18;
  const svgH = vertState.rows * VERT_ROW_H + VERT_PAD_Y + 12;
  const cursor = vertState.activeTool ? 'crosshair' : 'default';

  let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgW} ${svgH}"
    width="${svgW}" height="${svgH}" style="display:block;cursor:${cursor}">
  <defs>
    <filter id="vsh" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,.3)"/>
    </filter>
  </defs>
  <rect width="${svgW}" height="${svgH}" fill="#e8edf5" rx="6"/>`;

  // TE tick marks at top
  for (let c = 0; c <= vertState.te; c++) {
    const x = VERT_PAD_X + c * VERT_TE_W;
    const major = (c > 0 && c % 6 === 0) || c === 0;
    s += `<line x1="${x}" y1="${VERT_PAD_Y - 2}" x2="${x}" y2="${svgH - 4}"
      stroke="${major ? '#bbc5d4' : '#d4dae5'}" stroke-width="${major ? 0.8 : 0.4}"/>`;
    if (c < vertState.te && (c % 6 === 0 || c === 0)) {
      s += `<text x="${x + VERT_TE_W/2}" y="${VERT_PAD_Y - 4}" text-anchor="middle"
        font-size="8" fill="#b0b8c5" font-family="monospace">${c+1}</text>`;
    }
  }

  // DIN rail rows
  for (let r = 0; r < vertState.rows; r++) {
    const ry = VERT_PAD_Y + r * VERT_ROW_H;
    const rowW = vertState.te * VERT_TE_W;
    const railY = ry + 52;

    // Row background
    s += `<rect x="${VERT_PAD_X}" y="${ry}" width="${rowW}" height="${VERT_ROW_H}"
      fill="${r % 2 === 0 ? '#fff' : '#f7f8fb'}" stroke="none"/>`;

    // Row label
    s += `<text x="${VERT_PAD_X / 2}" y="${ry + VERT_ROW_H / 2}" text-anchor="middle"
      dominant-baseline="middle" font-size="10" font-weight="700" fill="#8a97a8"
      font-family="sans-serif">R${r+1}</text>`;

    // DIN rail (3-layer effect)
    s += `<rect x="${VERT_PAD_X - 2}" y="${railY - 5}" width="${rowW + 4}" height="10"
      fill="#8e99aa" rx="1.5"/>`;
    s += `<rect x="${VERT_PAD_X - 2}" y="${railY - 5}" width="${rowW + 4}" height="4"
      fill="#b4bfcc" rx="1.5"/>`;
    s += `<rect x="${VERT_PAD_X - 2}" y="${railY + 2}" width="${rowW + 4}" height="3"
      fill="#6d7888" rx="1"/>`;
  }

  // Placed components
  for (const item of vertState.items) {
    const comp = VERT_LIB.find(b => b.type === item.type);
    if (!comp) continue;
    const cx = VERT_PAD_X + item.col * VERT_TE_W;
    const cy = VERT_PAD_Y + item.row * VERT_ROW_H;
    const cw = comp.te * VERT_TE_W - 2;
    const ch = 46;
    const isSel = item.id === vertState.selectedId;

    s += `<g onclick="vertCompClick(event,${item.id})" style="cursor:pointer" role="button" aria-label="${esc(comp.label)}">`;

    // Selection halo
    if (isSel) {
      s += `<rect x="${cx - 1}" y="${cy + 2}" width="${cw + 2}" height="${ch + 2}"
        fill="none" stroke="#f39c12" stroke-width="2.5" stroke-dasharray="4,2" rx="5"/>`;
    }

    // Body
    s += `<rect x="${cx + 1}" y="${cy + 4}" width="${cw}" height="${ch}" fill="${comp.fill}"
      rx="4" filter="url(#vsh)" stroke="rgba(0,0,0,.1)" stroke-width="0.5"/>`;

    // Highlight stripe
    s += `<rect x="${cx + 1}" y="${cy + 4}" width="${cw}" height="9" fill="rgba(255,255,255,.18)" rx="4"/>`;

    // Icon
    const iconFs = comp.te === 1 ? 7 : (comp.te === 2 ? 8 : 9);
    s += `<text x="${cx + cw/2 + 1}" y="${cy + 26}" text-anchor="middle" dominant-baseline="middle"
      font-size="${iconFs}" font-weight="900" fill="${comp.text}" font-family="sans-serif">${esc(comp.icon)}</text>`;

    // Ampere label inside
    if (item.ampere > 0) {
      s += `<text x="${cx + cw/2 + 1}" y="${cy + 41}" text-anchor="middle"
        font-size="7" fill="${comp.text}" opacity=".85" font-family="monospace">${item.ampere}A</text>`;
    }

    // Description label below component
    if (item.label) {
      const maxCh = Math.max(3, comp.te * 3 - 1);
      const lbl = item.label.length > maxCh ? item.label.slice(0, maxCh - 1) + '…' : item.label;
      s += `<text x="${cx + cw/2 + 1}" y="${cy + 64}" text-anchor="middle"
        font-size="8" fill="#4a5568" font-family="sans-serif">${esc(lbl)}</text>`;
    }

    s += '</g>';
  }

  // Outer border
  s += `<rect x="0" y="0" width="${svgW}" height="${svgH}"
    fill="none" stroke="#c4cede" stroke-width="1.5" rx="6"/>`;
  s += '</svg>';

  wrap.innerHTML = s;
}

/* ── SVG Export ──────────────────────────────────────────────── */
function vertExportSVG() {
  const wrap = document.getElementById('vert-svg-wrap');
  if (!wrap) return;
  const svgEl = wrap.querySelector('svg');
  if (!svgEl) return;

  const clone = svgEl.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  // Remove interactive attributes
  clone.querySelectorAll('[onclick]').forEach(el => el.removeAttribute('onclick'));
  clone.querySelectorAll('[style*="cursor"]').forEach(el => {
    el.setAttribute('style', el.getAttribute('style').replace(/cursor:[^;]+;?/g, ''));
  });

  const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
  title.textContent = 'Verteiler-Plan';
  clone.insertBefore(title, clone.firstChild);

  const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML],
    { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Verteiler-Plan.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ── Transfer to Kalkulation ─────────────────────────────────── */
function vertToKalk() {
  const counts = {};
  const ampMap = {};
  vertState.items.forEach(item => {
    if (item.type === 'kl') return;
    counts[item.type] = (counts[item.type] || 0) + 1;
    if (item.ampere > 0) ampMap[item.type] = item.ampere;
  });

  const priceMap = {
    hs4:  { m: 145, desc: 'Hauptschalter 4-polig einbauen' },
    hs2:  { m: 125, desc: 'Hauptschalter 2-polig einbauen' },
    fi4:  { m: 125, desc: 'FI-Schutzschalter 4-polig 40A/30mA einbauen' },
    fi2:  { m: 78,  desc: 'FI-Schutzschalter 2-polig 25A/30mA einbauen' },
    ls1:  { m: 24,  desc: 'Leitungsschutzschalter 1-polig einbauen' },
    ls2:  { m: 35,  desc: 'Leitungsschutzschalter 2-polig einbauen' },
    ls3:  { m: 45,  desc: 'Leitungsschutzschalter 3-polig einbauen' },
    fls:  { m: 88,  desc: 'FI/LS-Kombination 1P+N einbauen' },
    fls4: { m: 145, desc: 'FI/LS-Kombination 4P einbauen' },
    spd:  { m: 245, desc: 'Überspannungsschutz Typ 2 einbauen' },
    nt:   { m: 165, desc: 'Netzteil 24V DC einbauen' },
    em:   { m: 285, desc: 'Energiezähler einbauen' },
  };

  const stdSatz = parseFloat(document.getElementById('defaultStundensatz').value) || 65;
  let added = 0;

  for (const [type, count] of Object.entries(counts)) {
    const p = priceMap[type];
    if (!p) continue;
    const ampere = ampMap[type];
    const ampLabel = ampere > 0 ? ` ${ampere}A` : '';
    daten.positionen.elektro.push({
      id: ++posIdCounter,
      pos: 'VP',
      beschreibung: `${p.desc}${ampLabel}`,
      einheit: 'Stk',
      menge: count,
      materialpreis: p.m,
      stundensatz: stdSatz,
      stunden: 0
    });
    added++;
  }

  if (added > 0) {
    renderPositionen('elektro');
    autoSave();
    closeVertEditor();
    switchTab('elektro');
    showToast(`✅ ${added} Positionen aus Verteilerplan übernommen`);
  } else {
    showToast('⚠️ Keine Bauteile zum Übernehmen – bitte zuerst Bauteile platzieren');
  }
}
