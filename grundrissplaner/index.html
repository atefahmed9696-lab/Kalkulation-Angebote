<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grundrissplaner V2.6</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1>Grundrissplaner V2.6</h1>
      <section>
        <h2>Werkzeuge</h2>
        <div class="tool-grid">
          <button class="tool-btn active" data-tool="select">Auswahl</button>
          <button class="tool-btn" data-tool="wall">Wand</button>
          <button class="tool-btn" data-tool="door">Tür</button>
          <button class="tool-btn" data-tool="window">Fenster</button>
          <button class="tool-btn" data-tool="dimension">Bemaßung</button>
          <button class="tool-btn" data-tool="electrical">Elektro</button>
          <button class="tool-btn" data-tool="sanitary">Sanitär</button>
          <button class="tool-btn" data-tool="heating">Heizung</button>
          <button class="tool-btn" data-tool="drywall">Trockenbau</button>
        </div>
      </section>
      <section>
        <h2>Etagen</h2>
        <div class="floor-controls">
          <select id="floor-select"></select>
          <button id="add-floor">+ Etage</button>
          <button id="rename-floor">Umbenennen</button>
          <button id="delete-floor" class="danger">Löschen</button>
        </div>
      </section>
      <section>
        <h2>Layer</h2>
        <div class="layer-list">
          <label><input type="checkbox" data-layer="architecture" checked /> Architektur</label>
          <label><input type="checkbox" data-layer="electrical" checked /> Elektro</label>
          <label><input type="checkbox" data-layer="sanitary" checked /> Sanitär</label>
          <label><input type="checkbox" data-layer="heating" checked /> Heizung</label>
          <label><input type="checkbox" data-layer="drywall" checked /> Trockenbau</label>
          <label><input type="checkbox" data-layer="dimension" checked /> Bemaßung</label>
        </div>
      </section>
      <section id="catalog-section">
        <h2>Katalog</h2>
        <select id="catalog-select"></select>
      </section>
      <section>
        <h2>Einstellungen</h2>
        <label class="stack">
          Raster
          <input type="checkbox" id="snap-toggle" checked />
        </label>
        <label class="stack">
          Rastergröße (m)
          <input type="number" id="grid-size" min="0.1" max="2" step="0.1" value="0.5" />
        </label>
        <label class="stack">
          Wandstärke (m)
          <input type="number" id="wall-thickness" min="0.05" max="1" step="0.01" value="0.20" />
        </label>
      </section>
      <section>
        <h2>Aktionen</h2>
        <div class="action-grid">
          <button id="save-json">Speichern</button>
          <button id="load-json">Laden</button>
          <button id="export-png">PNG Export</button>
          <button id="export-pdf">PDF Export</button>
          <button id="clear-all" class="danger">Alles löschen</button>
        </div>
        <input type="file" id="file-input" accept=".json,application/json" hidden />
      </section>
      <section>
        <h2>Eigenschaften</h2>
        <div id="properties-panel">
          <div>Kein Objekt ausgewählt.</div>
        </div>
      </section>
      <section>
        <h2>Shortcuts</h2>
        <div class="shortcuts">
          <div>1 Auswahl</div>
          <div>2 Wand</div>
          <div>3 Tür</div>
          <div>4 Fenster</div>
          <div>5 Bemaßung</div>
          <div>Q / E Drehen</div>
          <div>Strg+Z Undo</div>
          <div>Strg+Y Redo</div>
          <div>Strg+D Duplizieren</div>
        </div>
      </section>
    </aside>
    <main id="workspace">
      <div id="topbar">
        <div id="status-left">Werkzeug: Auswahl</div>
        <div id="status-center">Cursor: 0.00 m / 0.00 m</div>
        <div id="status-right">Fläche: 0.00 m²</div>
      </div>
      <canvas id="canvas"></canvas>
    </main>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
